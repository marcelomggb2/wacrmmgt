<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrelloFlow - Gestão de Projetos Premium</title>
  <!-- Google Fonts - Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="app-container">
    <!-- Sidebar: Gerenciamento de Quadros -->
    <aside class="sidebar" id="sidebar" aria-label="Navegação de Quadros">
      <div class="sidebar-header">
        <div class="logo">
          <i data-lucide="kanban" class="logo-icon"></i>
          <span class="logo-text">TrelloFlow</span>
        </div>
        <button class="icon-btn collapse-btn" id="collapse-sidebar-btn" title="Recolher menu lateral" aria-label="Recolher menu lateral">
          <i data-lucide="chevron-left"></i>
        </button>
      </div>

      <div class="sidebar-content">
        <div class="section-title">
          <span>Seus Quadros</span>
        </div>
        
        <nav class="boards-nav" id="boards-list" aria-label="Lista de quadros do projeto">
          <!-- Renderizado dinamicamente pelo JS -->
        </nav>

        <div class="add-board-container">
          <button class="add-board-trigger-btn" id="add-board-trigger">
            <i data-lucide="plus" class="btn-icon"></i> Criar Novo Quadro
          </button>
          
          <form class="add-board-form hidden" id="add-board-form">
            <input type="text" id="new-board-title" placeholder="Título do quadro..." required autocomplete="off">
            <div class="background-options-row">
              <span class="bg-option-label">Fundo:</span>
              <div class="bg-color-pickers" id="new-board-bg-options">
                <!-- Opções de cores/gradientes de fundo geradas dinamicamente -->
              </div>
            </div>
            <div class="form-actions">
              <button type="submit" class="primary-btn">Criar</button>
              <button type="button" class="cancel-btn" id="cancel-board-btn">Cancelar</button>
            </div>
          </form>
        </div>
      </div>
    </aside>

    <!-- Botão de abrir sidebar quando recolhida -->
    <button class="sidebar-expand-btn hidden" id="expand-sidebar-btn" title="Expandir menu lateral" aria-label="Expandir menu lateral">
      <i data-lucide="chevron-right"></i>
    </button>

    <!-- Área Principal do Quadro -->
    <main class="board-wrapper" id="board-wrapper">
      <!-- Cabeçalho do Quadro -->
      <header class="board-header">
        <div class="board-header-left">
          <!-- Nome do Quadro (editável) -->
          <div class="board-title-container">
            <h1 class="board-title" id="board-title" contenteditable="true" spellcheck="false" title="Clique para renomear" aria-label="Nome do quadro. Clique para editar.">Seletor de Quadro</h1>
          </div>
        </div>

        <div class="board-header-right">
          <!-- Barra de Pesquisa / Filtro -->
          <div class="search-container">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="search-cards-input" placeholder="Pesquisar cartões..." aria-label="Filtrar cartões por título ou etiquetas">
            <button class="clear-search-btn hidden" id="clear-search-btn" title="Limpar pesquisa">
              <i data-lucide="x"></i>
            </button>
          </div>

          <!-- Controle de Fundo -->
          <div class="popover-wrapper">
            <button class="header-btn" id="change-bg-btn" popovertarget="bg-popover" title="Alterar plano de fundo do quadro">
              <i data-lucide="palette"></i> Alterar Fundo
            </button>
            <div id="bg-popover" popover class="bg-selection-popover">
              <h3>Escolher plano de fundo</h3>
              <div class="bg-grid" id="bg-grid-options">
                <!-- Preenchido dinamicamente pelo JS -->
              </div>
            </div>
          </div>

          <!-- Opções do Quadro -->
          <button class="header-btn danger-btn" id="delete-board-btn" title="Excluir quadro atual">
            <i data-lucide="trash-2"></i> Excluir Quadro
          </button>
        </div>
      </header>

      <!-- Workspace do Quadro: Listas -->
      <div class="board-canvas" id="board-canvas">
        <div class="lists-container" id="lists-container">
          <!-- Listas renderizadas dinamicamente pelo JS -->
        </div>

        <!-- Botão/Form de Criar Nova Lista -->
        <div class="add-list-wrapper">
          <button class="add-list-trigger-btn" id="add-list-trigger">
            <i data-lucide="plus"></i> Adicionar outra lista
          </button>
          
          <form class="add-list-form hidden" id="add-list-form">
            <input type="text" id="new-list-title" placeholder="Insira o título da lista..." required autocomplete="off">
            <div class="form-actions">
              <button type="submit" class="primary-btn">Adicionar lista</button>
              <button type="button" class="cancel-btn" id="cancel-list-btn">
                <i data-lucide="x"></i>
              </button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- Dialog Modal: Detalhes do Cartão -->
  <dialog id="card-modal" closedby="any" class="card-detail-modal" aria-labelledby="modal-card-title">
    <div class="modal-cover" id="modal-card-cover"></div>
    <button class="modal-close-btn" id="modal-close-btn" aria-label="Fechar diálogo">
      <i data-lucide="x"></i>
    </button>
    
    <div class="modal-content">
      <!-- Cabeçalho do Modal -->
      <header class="modal-title-section">
        <i data-lucide="credit-card" class="modal-icon title-icon"></i>
        <div class="modal-title-container">
          <input type="text" id="modal-card-title" class="modal-card-title-input" value="Título do Cartão" aria-label="Editar título do cartão">
          <p class="modal-subtitle">Na lista <span id="modal-list-name" class="list-ref">A Fazer</span></p>
        </div>
      </header>

      <!-- Grid Principal do Modal -->
      <div class="modal-grid">
        <!-- Coluna Principal (Esquerda) -->
        <section class="modal-main-column">
          <!-- Etiquetas do Cartão (Labels) -->
          <div class="modal-section hidden" id="modal-labels-section">
            <h4 class="modal-label-title">Etiquetas</h4>
            <div class="modal-labels-container" id="modal-labels-container">
              <!-- Inserido dinamicamente -->
            </div>
          </div>

          <!-- Data de Entrega (Due Date) -->
          <div class="modal-section hidden" id="modal-due-date-section">
            <h4 class="modal-label-title">Prazo de Entrega</h4>
            <div class="due-date-badge-container">
              <label class="checkbox-container">
                <input type="checkbox" id="due-date-checkbox">
                <span class="checkmark"></span>
              </label>
              <div class="due-date-info" id="due-date-badge">
                <span id="due-date-text">25 de Junho</span>
                <span id="due-date-status" class="due-status-badge">No prazo</span>
              </div>
            </div>
          </div>

          <!-- Descrição -->
          <div class="modal-section">
            <div class="section-header">
              <i data-lucide="align-left" class="modal-icon"></i>
              <h3>Descrição</h3>
            </div>
            <div class="description-view" id="desc-view">
              <p class="desc-placeholder" id="desc-placeholder">Adicione uma descrição mais detalhada...</p>
              <div class="desc-text-content" id="desc-text-content"></div>
            </div>
            <div class="description-edit-form hidden" id="desc-edit-form">
              <textarea id="desc-textarea" placeholder="Adicione uma descrição mais detalhada..."></textarea>
              <div class="form-actions">
                <button class="primary-btn" id="save-desc-btn">Salvar</button>
                <button class="cancel-btn" id="cancel-desc-btn">Cancelar</button>
              </div>
            </div>
          </div>

          <!-- Checklist -->
          <div class="modal-section" id="checklist-section">
            <div class="section-header checklist-header">
              <div class="title-with-icon">
                <i data-lucide="check-square" class="modal-icon"></i>
                <h3>Checklist</h3>
              </div>
              <button class="secondary-btn danger-btn delete-checklist-btn" id="delete-checklist-btn">Excluir</button>
            </div>
            
            <!-- Barra de Progresso do Checklist -->
            <div class="progress-bar-container">
              <span class="progress-percentage" id="checklist-progress-percentage">0%</span>
              <div class="progress-track">
                <div class="progress-fill" id="checklist-progress-fill"></div>
              </div>
            </div>

            <!-- Lista de Itens do Checklist -->
            <div class="checklist-items" id="checklist-items-container">
              <!-- Renderizado dinamicamente -->
            </div>

            <!-- Adicionar Item ao Checklist -->
            <div class="add-checklist-item-container">
              <button class="add-item-trigger-btn" id="add-item-trigger">
                Adicionar um item
              </button>
              <div class="add-item-form hidden" id="add-item-form">
                <input type="text" id="new-item-text" placeholder="Adicionar um item..." autocomplete="off">
                <div class="form-actions">
                  <button class="primary-btn" id="save-item-btn">Adicionar</button>
                  <button class="cancel-btn" id="cancel-item-btn">Cancelar</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Comentários -->
          <div class="modal-section">
            <div class="section-header">
              <i data-lucide="message-square" class="modal-icon"></i>
              <h3>Atividade</h3>
            </div>
            <div class="comment-input-area">
              <div class="user-avatar">TF</div>
              <div class="comment-box">
                <textarea id="comment-textarea" placeholder="Escreva um comentário..." aria-label="Novo comentário"></textarea>
                <button class="primary-btn" id="save-comment-btn" disabled>Comentar</button>
              </div>
            </div>
            <div class="comments-list" id="comments-list-container">
              <!-- Comentários renderizados dinamicamente -->
            </div>
          </div>
        </section>

        <!-- Coluna de Ações (Direita) -->
        <aside class="modal-actions-column" aria-label="Ações do cartão">
          <h3>Adicionar ao Cartão</h3>
          
          <!-- Capa -->
          <div class="popover-wrapper">
            <button class="action-btn" id="card-cover-btn" popovertarget="cover-popover">
              <i data-lucide="image"></i> Capa
            </button>
            <div id="cover-popover" popover class="action-popover">
              <h4>Escolher Capa</h4>
              <div class="cover-options-grid" id="cover-options-grid">
                <!-- Preenchido pelo JS -->
              </div>
              <button class="secondary-btn remove-cover-btn" id="remove-cover-btn">Remover Capa</button>
            </div>
          </div>

          <!-- Etiquetas -->
          <div class="popover-wrapper">
            <button class="action-btn" id="card-labels-btn" popovertarget="labels-popover">
              <i data-lucide="tag"></i> Etiquetas
            </button>
            <div id="labels-popover" popover class="action-popover">
              <h4>Etiquetas</h4>
              <div class="labels-list" id="labels-selector-list">
                <!-- Gerado dinamicamente -->
              </div>
              <hr class="popover-separator">
              <button class="secondary-btn text-center-btn" id="create-label-trigger">Criar nova etiqueta</button>
              
              <!-- Formulário de criar nova etiqueta (flutuante no mesmo popover) -->
              <div class="create-label-form hidden" id="create-label-form">
                <input type="text" id="new-label-name" placeholder="Nome da etiqueta..." autocomplete="off">
                <div class="label-colors-pick" id="label-colors-pick">
                  <!-- Cores para etiqueta -->
                </div>
                <div class="form-actions">
                  <button class="primary-btn" id="save-new-label-btn">Salvar</button>
                  <button class="cancel-btn" id="cancel-new-label-btn">Voltar</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Datas -->
          <div class="popover-wrapper">
            <button class="action-btn" id="card-date-btn" popovertarget="date-popover">
              <i data-lucide="clock"></i> Datas
            </button>
            <div id="date-popover" popover class="action-popover date-popover-content">
              <h4>Definir Prazo</h4>
              <form id="date-form">
                <div class="form-group">
                  <label for="due-date-input">Data de Entrega</label>
                  <input type="date" id="due-date-input" required>
                </div>
                <div class="form-group">
                  <label for="due-time-input">Hora</label>
                  <input type="time" id="due-time-input" value="12:00">
                </div>
                <div class="form-actions">
                  <button type="submit" class="primary-btn">Salvar</button>
                  <button type="button" class="cancel-btn danger-btn" id="remove-date-btn">Remover</button>
                </div>
              </form>
            </div>
          </div>

          <!-- Checklist (Adicionar se não existir) -->
          <button class="action-btn" id="card-checklist-btn">
            <i data-lucide="check-square"></i> Checklist
          </button>

          <hr class="actions-separator">
          <h3>Ações</h3>
          
          <button class="action-btn danger-btn" id="delete-card-btn">
            <i data-lucide="trash-2"></i> Excluir Cartão
          </button>
        </aside>
      </div>
    </div>
  </dialog>
  
  <!-- JavaScript Principal -->
  <script type="module" src="app.js"></script>
</body>
</html>
